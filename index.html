<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сравнение цен Ozon vs Wildberries</title>
    <style>
        :root {
            --ozon: #005bff;
            --ozon-light: #e8f2ff;
            --wb: #cb11ab;
            --wb-light: #fde8f7;
            --star: #f59e0b;
            --green: #22c55e;
            --red: #ef4444;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #1e293b;
            --subtext: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }

        .header { text-align: center; margin-bottom: 1.5rem; }
        .header h1 { font-size: 2rem; font-weight: 700; background: linear-gradient(135deg, #6366f1, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .header p { color: var(--subtext); font-size: 0.95rem; margin-top: 0.25rem; }

        .warning-banner {
            background: #fef3c7; border: 1px solid #f59e0b; color: #92400e;
            padding: 0.8rem 1.2rem; border-radius: 12px; margin-bottom: 1rem;
            font-size: 0.85rem;
        }

        .search-section { background: var(--card); border-radius: 20px; padding: 1.5rem; box-shadow: 0 8px 30px rgba(0,0,0,0.05); margin-bottom: 1.5rem; }

        .search-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

        .search-input { flex: 1; min-width: 220px; padding: 0.85rem 1.2rem; font-size: 1rem; border: 2px solid #e2e8f0; border-radius: 14px; outline: none; background: #f8fafc; transition: all 0.2s; font-family: inherit; }
        .search-input:focus { border-color: #6366f1; box-shadow: 0 0 0 4px rgba(99,102,241,0.08); background: white; }

        .platform-select { display: flex; gap: 6px; background: #f1f5f9; border-radius: 14px; padding: 4px; }
        .platform-option { padding: 0.6rem 1.2rem; border-radius: 11px; border: none; cursor: pointer; font-weight: 600; font-size: 0.9rem; transition: all 0.2s; background: transparent; color: var(--subtext); font-family: inherit; white-space: nowrap; }
        .platform-option.active-ozon { background: var(--ozon); color: white; }
        .platform-option.active-wb { background: var(--wb); color: white; }

        .search-btn { padding: 0.85rem 2rem; background: #6366f1; color: white; font-weight: 600; font-size: 1rem; border: none; border-radius: 14px; cursor: pointer; transition: all 0.25s; white-space: nowrap; font-family: inherit; }
        .search-btn:hover { background: #4f46e5; transform: translateY(-1px); box-shadow: 0 8px 25px rgba(99,102,241,0.3); }
        .search-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .filter-row { display: flex; gap: 8px; margin-top: 0.8rem; flex-wrap: wrap; align-items: center; font-size: 0.8rem; color: var(--subtext); }
        .sort-btn { padding: 0.4rem 0.9rem; border-radius: 20px; border: 1.5px solid #e2e8f0; background: white; font-size: 0.8rem; cursor: pointer; font-weight: 500; transition: all 0.2s; font-family: inherit; }
        .sort-btn.active { background: #6366f1; color: white; border-color: #6366f1; }

        .loader { display: none; text-align: center; padding: 3rem; }
        .loader.active { display: block; }
        .spinner { width: 44px; height: 44px; border: 4px solid #e2e8f0; border-top: 4px solid #6366f1; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .results-header { display: none; justify-content: space-between; align-items: center; margin-bottom: 1rem; font-weight: 600; color: var(--subtext); }
        .results-header.visible { display: flex; }

        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.2rem; }

        .product-card {
            background: var(--card); border-radius: 18px; padding: 1.2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04); transition: all 0.3s;
            border: 2px solid transparent; cursor: pointer; display: flex; flex-direction: column;
        }
        .product-card:hover { transform: translateY(-4px); box-shadow: 0 12px 35px rgba(0,0,0,0.08); border-color: #6366f1; }
        .product-card.best-card { border-color: var(--green); }

        .card-img-container { width: 100%; height: 180px; background: #f8fafc; border-radius: 14px; display: flex; align-items: center; justify-content: center; margin-bottom: 0.8rem; position: relative; overflow: hidden; }
        .card-img { max-width: 85%; max-height: 85%; object-fit: contain; }
        .card-platform-badge { position: absolute; top: 10px; left: 10px; padding: 0.25rem 0.7rem; border-radius: 10px; font-size: 0.7rem; font-weight: 700; z-index: 2; }
        .card-platform-badge.ozon { background: var(--ozon-light); color: var(--ozon); }
        .card-platform-badge.wb { background: var(--wb-light); color: var(--wb); }

        .card-title { font-weight: 650; font-size: 0.9rem; margin-bottom: 0.5rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; flex-grow: 1; }
        .card-price { font-size: 1.4rem; font-weight: 700; color: #0f172a; margin-bottom: 0.3rem; }
        .card-meta { display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; flex-wrap: wrap; gap: 0.3rem; }
        .card-seller { color: var(--subtext); display: flex; align-items: center; gap: 0.3rem; }
        .card-rating { display: flex; align-items: center; gap: 0.2rem; font-weight: 600; font-size: 0.85rem; }
        .stars { color: var(--star); }
        .rating-high { color: var(--green); }
        .rating-mid { color: var(--star); }
        .rating-low { color: var(--red); }
        .card-hint { font-size: 0.7rem; color: #94a3b8; text-align: center; margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px dashed #e2e8f0; }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(15,23,42,0.6); backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center; padding: 1rem; }
        .modal-overlay.active { display: flex; }
        .modal { background: white; border-radius: 24px; max-width: 850px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 2rem; box-shadow: 0 25px 60px rgba(0,0,0,0.2); animation: modalIn 0.3s ease; }
        @keyframes modalIn { from { opacity: 0; transform: translateY(30px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .modal-close { float: right; background: #f1f5f9; border: none; width: 36px; height: 36px; border-radius: 10px; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .modal-close:hover { background: #e2e8f0; }
        .modal-header { margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 2px solid #f1f5f9; }
        .modal-header h2 { font-size: 1.2rem; display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap; }
        .modal-comparison { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }
        @media (max-width: 650px) { .modal-comparison { grid-template-columns: 1fr; } }

        .modal-card { border-radius: 18px; padding: 1.3rem; border: 2px solid #e2e8f0; }
        .modal-card.best { border-color: var(--green); box-shadow: 0 0 0 4px rgba(34,197,94,0.08); }
        .modal-card.not-found { opacity: 0.6; border-style: dashed; }
        .modal-card-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.8rem; font-weight: 700; flex-wrap: wrap; }
        .modal-card-header .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .modal-card-header .dot.ozon-dot { background: var(--ozon); }
        .modal-card-header .dot.wb-dot { background: var(--wb); }
        .modal-card img { width: 100%; height: 150px; object-fit: contain; background: #f8fafc; border-radius: 12px; margin-bottom: 0.8rem; }
        .modal-card .price-big { font-size: 1.5rem; font-weight: 700; }
        .modal-card .price-big.best-price { color: var(--green); }
        .modal-card .btn-go { display: block; width: 100%; margin-top: 1rem; padding: 0.7rem; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; text-align: center; text-decoration: none; font-family: inherit; color: white; transition: all 0.2s; }
        .modal-card .btn-go.ozon-btn { background: var(--ozon); }
        .modal-card .btn-go.wb-btn { background: var(--wb); }
        .modal-card .btn-go:hover { filter: brightness(1.1); }

        .discount-badge { font-size: 0.75rem; padding: 0.2rem 0.6rem; border-radius: 6px; font-weight: 700; display: inline-block; margin-top: 0.3rem; }
        .discount-badge.green { background: #dcfce7; color: #16a34a; }
        .discount-badge.red { background: #fef2f2; color: #ef4444; }

        .similar-section h3 { font-size: 1rem; margin-bottom: 0.8rem; color: var(--subtext); }
        .similar-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.8rem; }
        @media (max-width: 550px) { .similar-row { grid-template-columns: 1fr; } }
        .similar-item { background: #f8fafc; border-radius: 14px; padding: 0.8rem; text-align: center; cursor: pointer; transition: all 0.2s; border: 1px solid transparent; }
        .similar-item:hover { background: white; border-color: #6366f1; }
        .similar-item img { width: 70px; height: 70px; object-fit: contain; margin-bottom: 0.4rem; }
        .similar-item .s-name { font-size: 0.8rem; font-weight: 500; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .similar-item .s-price { font-weight: 700; margin-top: 0.2rem; }
        .similar-item .s-platform { font-size: 0.7rem; padding: 0.15rem 0.5rem; border-radius: 8px; display: inline-block; margin-top: 0.2rem; }
        .similar-item .s-platform.ozon-tag { background: var(--ozon-light); color: var(--ozon); }
        .similar-item .s-platform.wb-tag { background: var(--wb-light); color: var(--wb); }

        .no-results { display: none; text-align: center; padding: 3rem; background: white; border-radius: 20px; color: var(--subtext); }
        .no-results.active { display: block; }
        .no-results-icon { font-size: 3rem; margin-bottom: 0.8rem; }

        .error-message { background: #fef2f2; color: #991b1b; padding: 1rem; border-radius: 12px; margin-bottom: 1rem; display: none; text-align: center; }
        .error-message.show { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 Сравнение цен Ozon vs WB</h1>
            <p>Поиск товара на одной площадке → сравнение с ценой того же продавца на другой</p>
        </div>

        <div class="warning-banner">
            ⚠️ Wildberries работает всегда. Ozon может блокировать запросы из браузера (CORS).
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div class="search-section">
            <div class="search-row">
                <input type="text" class="search-input" id="searchInput" 
                       placeholder="Введите название товара..." autofocus>
                <div class="platform-select" id="platformSelect">
                    <button class="platform-option active-ozon" data-platform="ozon" id="btnOzon">🛒 Ozon</button>
                    <button class="platform-option" data-platform="wb" id="btnWB">🛍️ Wildberries</button>
                </div>
                <button class="search-btn" id="searchBtn">🔎 Искать</button>
            </div>
            <div class="filter-row">
                <span>Сортировка:</span>
                <button class="sort-btn active" data-sort="best" id="sortBest">Лучшие</button>
                <button class="sort-btn" data-sort="price-asc" id="sortPrice">Цена ↑</button>
                <button class="sort-btn" data-sort="rating" id="sortRating">Рейтинг</button>
            </div>
        </div>

        <div class="loader" id="loader">
            <div class="spinner"></div>
            <p id="loaderText">Загрузка...</p>
        </div>

        <div class="no-results" id="noResults">
            <div class="no-results-icon">😕</div>
            <p id="noResultsText">Ничего не найдено</p>
        </div>

        <div class="results-header" id="resultsHeader">
            <span>🛍️ Найдено: <strong id="resultsCount">0</strong></span>
            <span id="resultsPlatform"></span>
        </div>
        <div class="cards-grid" id="cardsGrid"></div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <button class="modal-close" id="modalClose">✕</button>
            <div class="modal-header" id="modalHeader"></div>
            <div class="modal-comparison" id="modalComparison"></div>
            <div class="similar-section" id="similarSection">
                <h3>📦 Похожие товары этого продавца</h3>
                <div class="similar-row" id="similarRow"></div>
            </div>
        </div>
    </div>

    <script>
        // Ждём полной загрузки DOM
        document.addEventListener('DOMContentLoaded', function() {
            
            const state = {
                searchPlatform: 'ozon',
                sortMode: 'best',
                searchResults: []
            };

            // Получаем все элементы по ID
            const searchInput = document.getElementById('searchInput');
            const searchBtn = document.getElementById('searchBtn');
            const btnOzon = document.getElementById('btnOzon');
            const btnWB = document.getElementById('btnWB');
            const sortBest = document.getElementById('sortBest');
            const sortPrice = document.getElementById('sortPrice');
            const sortRating = document.getElementById('sortRating');
            const loader = document.getElementById('loader');
            const loaderText = document.getElementById('loaderText');
            const noResults = document.getElementById('noResults');
            const noResultsText = document.getElementById('noResultsText');
            const resultsHeader = document.getElementById('resultsHeader');
            const resultsCount = document.getElementById('resultsCount');
            const resultsPlatform = document.getElementById('resultsPlatform');
            const cardsGrid = document.getElementById('cardsGrid');
            const modalOverlay = document.getElementById('modalOverlay');
            const modalClose = document.getElementById('modalClose');
            const modalHeader = document.getElementById('modalHeader');
            const modalComparison = document.getElementById('modalComparison');
            const similarSection = document.getElementById('similarSection');
            const similarRow = document.getElementById('similarRow');
            const errorMessage = document.getElementById('errorMessage');

            // Все sort-btn
            const allSortBtns = [sortBest, sortPrice, sortRating];

            function formatPrice(p) { return p ? p.toLocaleString('ru-RU') + ' ₽' : '—'; }
            function getStars(r) { if (!r) return ''; const f = Math.floor(r); return '★'.repeat(f) + (r - f >= 0.5 ? '½' : '') + '☆'.repeat(5 - f - (r - f >= 0.5 ? 1 : 0)); }
            function getRatingClass(r) { if (!r) return ''; return r >= 4.7 ? 'rating-high' : r >= 4.3 ? 'rating-mid' : 'rating-low'; }

            function sortResults(results, mode) {
                const sorted = [...results];
                if (mode === 'best') sorted.sort((a, b) => ((b.rating || 0) * 10000 - (b.price || 999999)) - ((a.rating || 0) * 10000 - (a.price || 999999)));
                else if (mode === 'price-asc') sorted.sort((a, b) => (a.price || 999999) - (b.price || 999999));
                else if (mode === 'rating') sorted.sort((a, b) => (b.rating || 0) - (a.rating || 0));
                return sorted;
            }

            function showError(msg) {
                errorMessage.textContent = msg;
                errorMessage.classList.add('show');
                setTimeout(() => errorMessage.classList.remove('show'), 4000);
            }

            async function searchWB(query) {
                const url = `https://search.wb.ru/exactmatch/ru/common/v9/search?ab_testid=false&appType=1&curr=rub&dest=-1029256&query=${encodeURIComponent(query)}&resultset=catalog&sort=popular&spp=30`;
                const response = await fetch(url);
                if (!response.ok) throw new Error(`WB API: HTTP ${response.status}`);
                const data = await response.json();
                const items = data.data?.products || [];
                return items.slice(0, 20).map(item => {
                    const title = item.name || '';
                    const price = item.salePriceU ? Math.floor(item.salePriceU / 100) : null;
                    const rating = item.reviewRating || item.rating || null;
                    const reviews = item.feedbacks || item.reviews || 0;
                    const seller = item.supplier || item.brand || '';
                    let image = '';
                    if (item.pics || item.pic) {
                        const imageId = item.pics || item.pic;
                        const vol = Math.floor(imageId / 100000);
                        const part = Math.floor(imageId / 1000);
                        image = `https://basket-${(vol % 15) + 1}.wbbasket.ru/vol${vol}/part${part}/${imageId}/images/big/1.webp`;
                    }
                    const productUrl = `https://www.wildberries.ru/catalog/${item.id}/detail.aspx`;
                    if (!title || !price) return null;
                    return { title, image, price, rating, reviews, seller, url: productUrl, platform: 'wb' };
                }).filter(Boolean);
            }

            async function searchOzon(query) {
                const url = `https://www.ozon.ru/api/entrypoint-api.bx/page/json/v2?url=/search/?text=${encodeURIComponent(query)}&from_global=true`;
                const response = await fetch(url, { headers: { 'Accept': 'application/json' } });
                if (!response.ok) throw new Error(`Ozon API: HTTP ${response.status}`);
                const data = await response.json();
                const widgets = data.widgetStates || {};
                const products = [];
                for (const [key, value] of Object.entries(widgets)) {
                    if (key.includes('searchResults') || key.includes('SearchResults')) {
                        const widgetData = JSON.parse(value);
                        const items = widgetData.items || [];
                        for (const item of items.slice(0, 20)) {
                            const title = item.title || '';
                            const image = item.image || '';
                            let price = null;
                            let rating = null;
                            let reviews = 0;
                            let seller = '';
                            let productUrl = '';
                            const mainState = item.mainState || [];
                            for (const state of mainState) {
                                if (state.atom?.price) {
                                    const pt = state.atom.price.text || state.atom.price.price || '';
                                    price = parseInt(String(pt).replace(/[^\d]/g, '')) || null;
                                    break;
                                }
                            }
                            if (item.rating) { rating = parseFloat(item.rating) || null; reviews = item.reviews || 0; }
                            if (item.seller) { seller = item.seller.name || item.seller.title || ''; }
                            if (item.link) { productUrl = item.link.startsWith('http') ? item.link : `https://www.ozon.ru${item.link}`; }
                            else if (item.id) { productUrl = `https://www.ozon.ru/product/${item.id}`; }
                            if (title && price) {
                                products.push({ title, image, price, rating, reviews, seller, url: productUrl, platform: 'ozon' });
                            }
                        }
                        break;
                    }
                }
                return products;
            }

            function renderCards(results, platform) {
                cardsGrid.innerHTML = '';
                if (results.length === 0) {
                    noResults.classList.add('active');
                    noResultsText.textContent = 'Ничего не найдено. Попробуйте изменить запрос.';
                    resultsHeader.classList.remove('visible');
                    return;
                }
                noResults.classList.remove('active');
                resultsHeader.classList.add('visible');
                resultsCount.textContent = results.length;
                resultsPlatform.textContent = platform === 'ozon' ? '🛒 Ozon' : '🛍️ Wildberries';

                results.forEach((p, i) => {
                    const card = document.createElement('div');
                    card.className = 'product-card' + (i === 0 && state.sortMode === 'best' ? ' best-card' : '');
                    card.innerHTML = `
                        <div class="card-img-container">
                            <span class="card-platform-badge ${platform}">${platform==='ozon'?'OZON':'WB'}</span>
                            ${p.image?`<img src="${p.image}" class="card-img" onerror="this.parentElement.innerHTML='<span style=font-size:3rem>📦</span>'">`:'<span style="font-size:3rem">📦</span>'}
                        </div>
                        <div class="card-title">${p.title}</div>
                        <div class="card-price">${formatPrice(p.price)}</div>
                        <div class="card-meta">
                            <span class="card-seller">🏪 ${p.seller||'Неизвестный'}</span>
                            ${p.rating?`<span class="card-rating ${getRatingClass(p.rating)}"><span class="stars">${getStars(p.rating)}</span>${p.rating.toFixed(1)}</span>`:'<span class="card-rating" style="color:#94a3b8">Нет оценок</span>'}
                        </div>
                        <div class="card-hint">👆 Нажмите, чтобы сравнить с другой площадкой</div>`;
                    card.addEventListener('click', () => openComparison(p, platform));
                    cardsGrid.appendChild(card);
                });
            }

            async function openComparison(product, searchPlatform) {
                const otherPlatform = searchPlatform === 'ozon' ? 'wb' : 'ozon';
                modalHeader.innerHTML = `<h2>📦 ${product.title} <span style="font-size:0.85rem;color:#64748b;">от ${product.seller||'неизвестного'}</span></h2>`;
                modalComparison.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:2rem"><div class="spinner" style="margin:0 auto 1rem"></div><p>Ищем на другой площадке...</p></div>';
                similarSection.style.display = 'none';
                modalOverlay.classList.add('active');

                const sq = `${product.title.split(' ').slice(0,4).join(' ')} ${product.seller||''}`.trim();

                try {
                    const otherResults = otherPlatform === 'ozon' ? await searchOzon(sq) : await searchWB(sq);
                    const filtered = otherResults.filter(r => {
                        const sm = !product.seller || r.seller?.toLowerCase().includes(product.seller.toLowerCase()) || product.seller.toLowerCase().includes(r.seller?.toLowerCase()||'');
                        const tw = product.title.toLowerCase().split(' ').filter(w=>w.length>2);
                        const tm = tw.some(w=>r.title.toLowerCase().includes(w));
                        return sm || tm;
                    });

                    const od = filtered[0] || null;
                    const sd = { title:product.title, price:product.price, rating:product.rating, reviews:product.reviews, image:product.image, url:product.url, seller:product.seller };
                    const bp = od?.price ? (sd.price <= od.price ? searchPlatform : otherPlatform) : searchPlatform;

                    modalComparison.innerHTML = [
                        { k:searchPlatform, d:sd, l:searchPlatform==='ozon'?'Ozon (исходный)':'WB (исходный)', dc:searchPlatform==='ozon'?'ozon-dot':'wb-dot', bc:searchPlatform==='ozon'?'ozon-btn':'wb-btn' },
                        { k:otherPlatform, d:od, l:otherPlatform==='ozon'?'Ozon':'WB', dc:otherPlatform==='ozon'?'ozon-dot':'wb-dot', bc:otherPlatform==='ozon'?'ozon-btn':'wb-btn' }
                    ].map(p => {
                        if (!p.d?.price) return `<div class="modal-card not-found"><div class="modal-card-header"><span class="dot ${p.dc}"></span>${p.l}</div><div style="text-align:center;padding:2rem"><p style="font-size:2rem">📭</p><p>Товар не найден</p></div></div>`;
                        const ib = p.k === bp;
                        const pd = sd.price && p.d.price && sd.price !== p.d.price ? Math.abs(sd.price - p.d.price) : 0;
                        const pp = pd>0 && Math.min(sd.price,p.d.price)>0 ? Math.round((pd/Math.min(sd.price,p.d.price))*100) : 0;
                        return `<div class="modal-card ${ib?'best':''}">
                            <div class="modal-card-header"><span class="dot ${p.dc}"></span>${p.l} ${ib?'<span class="discount-badge green">🏆 Лучшая цена</span>':''}</div>
                            ${p.d.image?`<img src="${p.d.image}" onerror="this.parentElement.innerHTML+='<div style=text-align:center;font-size:3rem>📦</div>'">`:'<div style="text-align:center;font-size:3rem">📦</div>'}
                            <p style="font-weight:600;font-size:0.9rem;margin-bottom:0.5rem">${p.d.title}</p>
                            <div class="price-big ${ib?'best-price':''}">${formatPrice(p.d.price)}</div>
                            ${!ib&&pd>0?`<span class="discount-badge red">Дороже на ${formatPrice(pd)} (${pp}%)</span>`:''}
                            ${ib&&pd>0?`<span class="discount-badge green">Экономия ${formatPrice(pd)} (${pp}%)</span>`:''}
                            <div style="margin-top:0.5rem;font-size:0.85rem">${p.d.rating?`★ ${p.d.rating.toFixed(1)}`:''} ${p.d.reviews?`(${p.d.reviews} отзывов)`:''}</div>
                            <div style="font-size:0.8rem;color:#64748b;margin-top:0.3rem">🏪 ${p.d.seller||'Не указан'}</div>
                            <a href="${p.d.url||'#'}" target="_blank" rel="noopener" class="btn-go ${p.bc}">Перейти →</a>
                        </div>`;
                    }).join('');

                    if (filtered.length > 1) {
                        similarSection.style.display = 'block';
                        similarRow.innerHTML = filtered.slice(1,4).map(s => `
                            <div class="similar-item" onclick="window.open('${s.url||'#'}','_blank')">
                                ${s.image?`<img src="${s.image}" onerror="this.parentElement.innerHTML='<span style=font-size:2rem>📦</span>'">`:'<span style="font-size:2rem">📦</span>'}
                                <div class="s-name">${s.title}</div>
                                <div class="s-price">${formatPrice(s.price)}</div>
                                <span class="s-platform ${otherPlatform==='ozon'?'ozon-tag':'wb-tag'}">${otherPlatform==='ozon'?'Ozon':'WB'}</span>
                            </div>`).join('');
                    }
                } catch (e) {
                    modalComparison.innerHTML = `<div style="text-align:center;padding:2rem;color:#ef4444"><p>❌ Ошибка: ${e.message}</p></div>`;
                }
            }

            async function performSearch() {
                const query = searchInput.value.trim();
                if (query.length < 2) { showError('Введите минимум 2 символа'); return; }

                loader.classList.add('active');
                loaderText.textContent = `Ищем "${query}" на ${state.searchPlatform==='ozon'?'Ozon':'Wildberries'}...`;
                noResults.classList.remove('active');
                resultsHeader.classList.remove('visible');
                cardsGrid.innerHTML = '';
                searchBtn.disabled = true;

                try {
                    const results = state.searchPlatform === 'ozon' ? await searchOzon(query) : await searchWB(query);
                    const sorted = sortResults(results, state.sortMode);
                    state.searchResults = sorted;
                    renderCards(sorted, state.searchPlatform);
                    if (results.length === 0) noResultsText.textContent = `По запросу "${query}" ничего не найдено`;
                } catch (e) {
                    noResults.classList.add('active');
                    noResultsText.textContent = `Ошибка: ${e.message}. ${state.searchPlatform==='ozon'?'Попробуйте поискать на Wildberries.':''}`;
                } finally {
                    loader.classList.remove('active');
                    searchBtn.disabled = false;
                }
            }

            // ============ ОБРАБОТЧИКИ КНОПОК ============

            // Кнопка поиска
            searchBtn.addEventListener('click', performSearch);
            
            // Enter в поле ввода
            searchInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') performSearch();
            });

            // Кнопка Ozon
            btnOzon.addEventListener('click', function() {
                btnOzon.classList.add('active-ozon');
                btnOzon.classList.remove('active-wb');
                btnWB.classList.remove('active-ozon', 'active-wb');
                state.searchPlatform = 'ozon';
                console.log('Выбрана площадка: Ozon');
            });

            // Кнопка Wildberries
            btnWB.addEventListener('click', function() {
                btnWB.classList.add('active-wb');
                btnWB.classList.remove('active-ozon');
                btnOzon.classList.remove('active-ozon', 'active-wb');
                state.searchPlatform = 'wb';
                console.log('Выбрана площадка: Wildberries');
            });

            // Кнопки сортировки
            sortBest.addEventListener('click', function() {
                allSortBtns.forEach(b => b.classList.remove('active'));
                sortBest.classList.add('active');
                state.sortMode = 'best';
                if (state.searchResults.length > 0) {
                    const sorted = sortResults(state.searchResults, 'best');
                    state.searchResults = sorted;
                    renderCards(sorted, state.searchPlatform);
                }
                console.log('Сортировка: лучшие');
            });

            sortPrice.addEventListener('click', function() {
                allSortBtns.forEach(b => b.classList.remove('active'));
                sortPrice.classList.add('active');
                state.sortMode = 'price-asc';
                if (state.searchResults.length > 0) {
                    const sorted = sortResults(state.searchResults, 'price-asc');
                    state.searchResults = sorted;
                    renderCards(sorted, state.searchPlatform);
                }
                console.log('Сортировка: цена по возрастанию');
            });

            sortRating.addEventListener('click', function() {
                allSortBtns.forEach(b => b.classList.remove('active'));
                sortRating.classList.add('active');
                state.sortMode = 'rating';
                if (state.searchResults.length > 0) {
                    const sorted = sortResults(state.searchResults, 'rating');
                    state.searchResults = sorted;
                    renderCards(sorted, state.searchPlatform);
                }
                console.log('Сортировка: по рейтингу');
            });

            // Закрытие модального окна
            modalClose.addEventListener('click', function() {
                modalOverlay.classList.remove('active');
            });

            modalOverlay.addEventListener('click', function(e) {
                if (e.target === modalOverlay) {
                    modalOverlay.classList.remove('active');
                }
            });

            // Escape для закрытия модалки
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && modalOverlay.classList.contains('active')) {
                    modalOverlay.classList.remove('active');
                }
            });

            console.log('✅ Все кнопки работают!');
            console.log('🛒 Ozon - кнопка слева');
            console.log('🛍️ Wildberries - кнопка справа');
            console.log('📊 Сортировка: Лучшие | Цена ↑ | Рейтинг');
            console.log('💡 Введите запрос и нажмите "Искать" или Enter');
        });
    </script>
</body>
</html>
